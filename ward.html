<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>वडा कार्यालयहरु | मनराशिसवा नगरपालिका</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="header-container"></div>
    <main class="container page-content">
        <div class="breadcrumb">
            <a href="index.html">गृहपृष्ठ</a> <span>></span>
            <span>वडा कार्यालयहरु</span>
        </div>
        
        <h2 class="section-title">वडा कार्यालयहरु</h2>
        
        <div class="grid-3" id="wardsGrid">
            <!-- Loaded via JS -->
            <div class="card" style="text-align:center; cursor:pointer;" onclick="showWard(1)">
                <div style="font-size:40px; margin-bottom:10px;">🏢</div>
                <h3>वडा नं. १</h3>
                <p style="color:var(--danger); font-weight:bold;">राम प्रवेश यादव (अध्यक्ष)</p>
                <p>📞 ९८०००००००१</p>
                <button class="btn btn-outline btn-sm" style="margin-top:10px;">विवरण हेर्नुहोस्</button>
            </div>
            <div class="card" style="text-align:center; cursor:pointer;" onclick="showWard(2)">
                <div style="font-size:40px; margin-bottom:10px;">🏢</div>
                <h3>वडा नं. २</h3>
                <p style="color:var(--danger); font-weight:bold;">श्याम सुन्दर साह (अध्यक्ष)</p>
                <p>📞 ९८०००००००२</p>
                <button class="btn btn-outline btn-sm" style="margin-top:10px;">विवरण हेर्नुहोस्</button>
            </div>
        </div>

        <div id="wardModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:9999; align-items:center; justify-content:center;">
            <div style="background:white; padding:30px; border-radius:var(--radius); max-width:600px; width:90%; position:relative;">
                <button onclick="document.getElementById('wardModal').style.display='none'" style="position:absolute; top:15px; right:15px; background:none; border:none; font-size:24px; cursor:pointer;">&times;</button>
                <h2 id="modalTitle" style="color:var(--primary); margin-bottom:20px; border-bottom:2px solid var(--secondary); padding-bottom:10px;"></h2>
                <div class="grid-2" style="margin-bottom:20px;">
                    <div>
                        <strong>वडा अध्यक्ष:</strong> <span id="modalChair"></span><br>
                        <strong>फोन:</strong> <span id="modalPhone"></span><br>
                        <strong>ईमेल:</strong> <span id="modalEmail"></span>
                    </div>
                </div>
                <div style="background:var(--bg); padding:15px; border-radius:var(--radius-sm);">
                    <h4>विवरण:</h4>
                    <p id="modalDesc"></p>
                </div>
            </div>
        </div>
    </main>
    <div id="footer-container"></div>
    
    <script src="js/components.js"></script>
    <script src="js/app.js"></script>
    <script>
        initPage('wards');
        
        let wardsData = [];

        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const wards = await api('/wards');
                if (wards && wards.length > 0) {
                    wardsData = wards;
                    const grid = document.getElementById('wardsGrid');
                    grid.innerHTML = '';
                    wards.forEach(w => {
                        grid.innerHTML += `
                            <div class="card" style="text-align:center; cursor:pointer;" onclick="showWard(${w.id})">
                                <div style="font-size:40px; margin-bottom:10px;">🏢</div>
                                <h3>${w.ward_name}</h3>
                                <p style="color:var(--danger); font-weight:bold;">${w.chairman_name || '-'} (अध्यक्ष)</p>
                                <p>📞 ${toNepaliDigits(w.phone) || '-'}</p>
                                <button class="btn btn-outline btn-sm" style="margin-top:10px;">विवरण हेर्नुहोस्</button>
                            </div>
                        `;
                    });
                }
            } catch (e) { console.log('Using fallback'); }
        });

        function showWard(id) {
            const ward = wardsData.find(w => w.id === id) || { 
                ward_name: 'वडा नं. ' + toNepaliDigits(id), 
                chairman_name: 'राम प्रवेश यादव', 
                phone: '9800000000', 
                email: 'ward1@manarashiswamun.gov.np',
                description: 'साविकको गाविस क्षेत्र समेटेर बनाइएको वडा।'
            };
            
            document.getElementById('modalTitle').textContent = ward.ward_name;
            document.getElementById('modalChair').textContent = ward.chairman_name || '-';
            document.getElementById('modalPhone').textContent = toNepaliDigits(ward.phone) || '-';
            document.getElementById('modalEmail').textContent = ward.email || '-';
            document.getElementById('modalDesc').textContent = ward.description || 'विवरण उपलब्ध छैन।';
            
            const modal = document.getElementById('wardModal');
            modal.style.display = 'flex';
        }
    </script>
</body>
</html>
