<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>प्रतिवेदन | मनराशिसवा नगरपालिका</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="header-container"></div>
    <main class="container page-content">
        <div class="breadcrumb">
            <a href="index.html">गृहपृष्ठ</a> <span>></span>
            <span>प्रतिवेदन</span>
        </div>
        
        <h2 class="section-title">प्रतिवेदन (Reports)</h2>
        
        <div class="card">
            <div style="overflow-x:auto;">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th width="5%">क्र.सं.</th>
                            <th width="60%">शीर्षक</th>
                            <th width="15%">प्रकार</th>
                            <th width="10%">मिति</th>
                            <th width="10%">डाउनलोड</th>
                        </tr>
                    </thead>
                    <tbody id="reportsList">
                        <!-- Fallback -->
                        <tr>
                            <td>१</td>
                            <td>आ.व.२०८१-०८२ को वार्षिक प्रगति प्रतिवेदन</td>
                            <td><span class="badge badge-notice">वार्षिक</span></td>
                            <td>२०८२-०४-१५</td>
                            <td><a href="#" class="btn btn-sm btn-outline">डाउनलोड</a></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
    <div id="footer-container"></div>
    
    <script src="js/components.js"></script>
    <script src="js/app.js"></script>
    <script>
        initPage('reports');
        
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const reports = await api('/reports');
                if (reports && reports.length > 0) {
                    const list = document.getElementById('reportsList');
                    list.innerHTML = '';
                    
                    reports.forEach((r, i) => {
                        let typeName = r.report_type;
                        if(typeName === 'annual') typeName = 'वार्षिक';
                        if(typeName === 'quarterly') typeName = 'चौमासिक';
                        if(typeName === 'hearing') typeName = 'सार्वजनिक सुनुवाई';
                        if(typeName === 'testing') typeName = 'सार्वजनिक परीक्षण';
                        
                        list.innerHTML += `
                            <tr>
                                <td>${toNepaliDigits(i+1)}</td>
                                <td>${r.title}</td>
                                <td><span class="badge badge-notice">${typeName}</span></td>
                                <td>${r.publish_date ? toNepaliDigits(r.publish_date.split('T')[0]) : '-'}</td>
                                <td>${r.file_url ? `<a href="${r.file_url}" target="_blank" class="btn btn-sm btn-outline">डाउनलोड</a>` : '-'}</td>
                            </tr>
                        `;
                    });
                }
            } catch (e) { console.log('Using fallback'); }
        });
    </script>
</body>
</html>
