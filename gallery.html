<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>फोटो ग्यालरी | मनराशिसवा नगरपालिका</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="header-container"></div>
    <main class="container page-content">
        <div class="breadcrumb">
            <a href="index.html">गृहपृष्ठ</a> <span>></span>
            <span>ग्यालरी</span>
        </div>
        
        <h2 class="section-title">फोटो ग्यालरी (Photo Gallery)</h2>
        
        <div class="grid-3" id="galleryGrid" style="gap: 20px;">
            <!-- Fallback -->
            <div class="card" style="padding:10px;">
                <img src="https://picsum.photos/400/300?random=30" style="width:100%; height:200px; object-fit:cover; border-radius:var(--radius-sm);">
                <h4 style="margin-top:10px;">नगर सभा</h4>
            </div>
            <div class="card" style="padding:10px;">
                <img src="https://picsum.photos/400/300?random=31" style="width:100%; height:200px; object-fit:cover; border-radius:var(--radius-sm);">
                <h4 style="margin-top:10px;">युवा संस्कार शिविर</h4>
            </div>
            <div class="card" style="padding:10px;">
                <img src="https://picsum.photos/400/300?random=32" style="width:100%; height:200px; object-fit:cover; border-radius:var(--radius-sm);">
                <h4 style="margin-top:10px;">सरसफाई कार्यक्रम</h4>
            </div>
        </div>
    </main>
    <div id="footer-container"></div>
    
    <script src="js/components.js"></script>
    <script src="js/app.js"></script>
    <script>
        initPage('gallery');
        
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const photos = await api('/gallery');
                if (photos && photos.length > 0) {
                    const grid = document.getElementById('galleryGrid');
                    grid.innerHTML = '';
                    photos.forEach(p => {
                        grid.innerHTML += `
                            <div class="card" style="padding:10px;">
                                <a href="${p.image_url}" target="_blank">
                                    <img src="${p.image_url}" style="width:100%; height:200px; object-fit:cover; border-radius:var(--radius-sm);">
                                </a>
                                <h4 style="margin-top:10px;">${p.title || 'तस्बिर'}</h4>
                                <p style="font-size:12px; color:var(--text-light);">${p.event_date ? toNepaliDigits(p.event_date.split('T')[0]) : ''}</p>
                            </div>
                        `;
                    });
                }
            } catch (e) { console.log('Using fallback'); }
        });
    </script>
</body>
</html>
